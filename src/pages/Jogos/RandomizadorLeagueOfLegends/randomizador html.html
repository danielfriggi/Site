<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Como vou jogar hoje?</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(180deg, #050816, #0f172a);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .container {
      width: 100%;
      max-width: 1400px;
      text-align: center;
    }

    h1 {
      font-size: 72px;
      margin-bottom: 50px;
      color: #d4af37;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
    }

    .content {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 25px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 25px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
    }

    .card h2 {
      margin-bottom: 25px;
      color: #60a5fa;
      font-size: 30px;
    }

    .champion-img {
      width: 220px;
      border-radius: 18px;
      margin-bottom: 20px;
      border: 3px solid #d4af37;
    }

    .champion-name {
      font-size: 38px;
      font-weight: bold;
    }

    .runes-list,
    .items-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
    }

    .rune,
    .item {
      width: 100px;
      text-align: center;
    }

    .rune img {
      width: 75px;
      height: 75px;
      border-radius: 10px;
    }

    .item img {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      margin-bottom: 6px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      background: #111827;
    }

    .rune {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 10px;
      min-height: 80px;

      display: block;
      align-items: center;
      justify-content: center;
    }

    .rune span,
    .item span {
      font-size: 12px;
      display: block;
      line-height: 1.3;
    }

    h3 {
      margin-bottom: 16px;
      margin-top: 20px;
      color: #d4af37;
      font-size: 20px;
    }

    button {
      margin-top: 40px;
      padding: 18px 36px;
      border: none;
      border-radius: 14px;
      background: #2563eb;
      color: white;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background: #1d4ed8;
    }

    .loading {
      font-size: 24px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Como vou jogar hoje?</h1>

    <div id="app" class="loading">
      Carregando caos ranqueado...
    </div>

    <button onclick="generateBuild()">
      RANDOMIZAR
    </button>

  </div>

  <script>

          },

            },

            }
          ]

        ]
      }


    ];


    function random(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function pickOne(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    async function loadData() {

      const championsRes = await fetch(
        `https://ddragon.leagueoflegends.com/cdn/${version}/data/pt_BR/champion.json`
      );

      const championsData = await championsRes.json();

      champions = Object.values(championsData.data);

      const itemsRes = await fetch(
        `https://ddragon.leagueoflegends.com/cdn/${version}/data/pt_BR/item.json`
      );

      const itemsData = await itemsRes.json();

      items = Object.values(itemsData.data)
        .filter(item => item.gold.total >= 2200 && item.maps['11'])
        .map(item => ({
          name: item.name,
          image: item.image.full
        }));

      generateBuild();
    }

    function getRandomItems(count = 6) {

      const shuffled = [...items]
        .sort(() => 0.5 - Math.random());

      return shuffled.slice(0, count);
    }

    function generateRunePage() {

      // árvore primária
      const primaryTree = pickOne(runeTrees);

      const primaryRune = pickOne(primaryTree.primary);

      const primaryChoices = primaryTree.groups.map(
        group => pickOne(group)
      );

      // árvore secundária
      const secondaryOptions = runeTrees.filter(
        tree => tree.name !== primaryTree.name
      );

      const secondaryTree = pickOne(secondaryOptions);

      // escolhe 2 grupos aleatórios
      const shuffledGroups = [...secondaryTree.groups]
        .sort(() => 0.5 - Math.random());

      const secondaryChoices = [
        pickOne(shuffledGroups[0]),
        pickOne(shuffledGroups[1]),
        pickOne(shuffledGroups[2])
      ];

      // shards

      const shards = [

        pickOne([

          {
            name: 'Velocidade de Ataque',
            img: 'img/velocidade-de-ataque.png'
          },

          {
            name: 'Aceleração de Habilidade',
            img: 'img/cdr.png'
          },

          {
            name: 'Força Adaptativa',
            img: 'img/força.png'
          }

        ]),

        pickOne([

          {
            name: 'Força Adaptativa',
            img: 'img/força.png'
          },

          {
            name: 'Velocidade de Movimento',
            img: 'img/velocidade-de-movimento.png'
          },

          {
            name: 'Escalamento de Vida',
            img: 'img/vida-escalavel.png'
          }

        ]),

        pickOne([

          {
            name: 'Vida',
            img: 'img/vida.png'
          },

          {
            name: 'Tenacidade e Resistência a Lentidão',
            img: 'img/tenacidade.png'
          },

          {
            name: 'Escalamento de Vida',
            img: 'img/vida-escalavel.png'
          }

        ])

      ];


      return {
        primaryTree,
        primaryRune,
        primaryChoices,

        secondaryTree,
        secondaryChoices,

        shards
      };
    }

    function generateBuild() {

      if (!champions.length || !items.length) return;

      const champion = random(champions);

      const selectedItems = getRandomItems();

      const runePage = generateRunePage();

      document.getElementById('app').innerHTML = `

        <div class="content">

          <div class="card">

            <h2>Campeão</h2>

            <img
              class="champion-img"
              src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/${champion.id}_0.jpg"
            />

            <div class="champion-name">
              ${champion.name}
            </div>

          </div>

          <div class="card">

            <h2>Runas</h2>

            <div>

              <h3>
                Primária — ${runePage.primaryTree.name}
              </h3>

              <div class="runes-list">

                <div class="rune">
                 <img src="${runePage.primaryRune.img}" />
                 <span>${runePage.primaryRune.name}</span>
                </div>

                ${runePage.primaryChoices.map(rune => `
                  <div class="rune">
                    <img src="${rune.img}" />
                    <span>${rune.name}</span>
                  </div>
                `).join('')}

              </div>

            </div>

            <div>

              <h3>
                Secundária — ${runePage.secondaryTree.name}
              </h3>

              <div class="runes-list">

                ${runePage.secondaryChoices.map(rune => `
                  <div class="rune">
                    <img src="${rune.img}" />
                    <span>${rune.name}</span>
                  </div>
                `).join('')}

              </div>

            </div>

            <div>

              <h3>
                Atributos
              </h3>

              <div class="runes-list">

                ${runePage.shards.map(shard => `
                  <div class="rune">
                    <img src="${shard.img}" /> 
                    <span>${shard.name}</span>
                  </div>
                `).join('')}

              </div>

            </div>

          </div>

          <div class="card">

            <h2>Build</h2>

            <div class="items-list">

              ${selectedItems.map(item => `
                <div class="item">

                  <img
                    src="https://ddragon.leagueoflegends.com/cdn/${version}/img/item/${item.image}"
                  />

                  <span>${item.name}</span>

                </div>
              `).join('')}

            </div>

          </div>

        </div>
      `;
    }

    loadData();

  </script>

</html>
